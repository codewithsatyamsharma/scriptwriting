<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <title>Drawing Pad</title>
</head>
<body>

    <section>
        <div class="toolsection">
            <div class="toolicon">
                <button class="tool active" title="Select"><i class="fas fa-mouse-pointer"></i></button>
                <button class="tool" title="Pencil"><i class="fas fa-pencil-alt"></i></button>
                <button class="tool" title="Eraser"><i class="fas fa-eraser"></i></button>
                <button class="tool" title="Rectangle"><i class="far fa-square"></i></button>
                <button class="tool" title="Circle"><i class="far fa-circle"></i></button>
                <button class="tool" title="Line"><i class="fas fa-minus"></i></button>
                <button class="tool" title="Text"><i class="fas fa-font"></i></button>
                <button class="tool" title="Fill Color"><i class="fas fa-fill-drip"></i></button>
                <button class="tool" title="Undo"><i class="fas fa-undo"></i></button>
                <button class="tool" title="Clear Canvas"><i class="fas fa-trash-alt"></i></button>
                <input type="color" id="color-picker" title="Select Color">
            </div>
        </div>

        <div id="cursor-follower"></div>

        <canvas id="canvas"></canvas>
    </section>
    
    <script src="script.js"></script>
</body>
</html>
